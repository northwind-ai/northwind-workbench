name: 🐛 Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for the report! Please fill in the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal repo or command sequence is hugely helpful.
      placeholder: |
        1. Run `package-workbench scan .`
        2. ...
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where did it happen?
      options: [CLI, Desktop app, Both, Not sure]
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package Workbench version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Node version, package manager (npm/pnpm/yarn)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: For the desktop app, use "Open Logs Folder" and attach the relevant lines.
      render: shell
