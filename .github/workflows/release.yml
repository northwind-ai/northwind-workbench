name: Release

# Build installers for every OS when a version tag is pushed, and attach them to
# the GitHub Release. Trigger: `git tag v1.2.3 && git push origin v1.2.3`.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Build packages
        run: pnpm build

      # electron-builder reads the version from apps/desktop/package.json.
      - name: Build installers
        run: pnpm --filter @package-workbench/desktop package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to the release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-cli:
    name: Publish CLI to npm
    needs: build
    runs-on: ubuntu-latest
    # Requires an NPM_TOKEN secret; remove this job if you don't publish the CLI.
    if: ${{ false }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @package-workbench/cli publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
